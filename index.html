<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フォトフレームカメラ</title>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background-color: #001e43; color: #fff; font-family: sans-serif; }
        .camera-container { position: relative; width: 100%; max-width: 400px; aspect-ratio: 9/16; overflow: hidden; background: #222; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); /* インカメラ用に反転 */ }
        .frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; object-fit: contain; }
        .btn { margin-top: 15px; padding: 12px 24px; background-color: #ff3366; color: white; border: none; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; }
        #canvas { display: none; }
        .popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px; box-sizing: border-box; }
        .popup p { font-size: 18px; margin-bottom: 20px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <img class="frame" src="https://via.placeholder.com/1080x1920/000000/000000.png?text=Frame_Area" id="frameImg" alt="Frame">
    </div>

    <button class="btn" id="captureBtn">写真を撮影する</button>

    <canvas id="canvas"></canvas>

    <div id="popup" class="popup">
        <p>🎉 撮影が完了しました！<br>公式Instagramをフォローして<br>写真を保存しよう！</p>
        <a href="https://www.instagram.com/shonandai_tanabata?igsh=MXhhcmphbDZtcjZtMA%3D%3D&utm_source=qr"_blank" class="btn" id="followBtn">Instagramをフォローする</a>
        <div id="downloadArea" style="display:none; margin-top: 20px;">
            <p>👇 フォローありがとうございます！<br>下の画像を表示・長押しして保存してください</p>
            <img id="resultImage" style="width: 100%; max-width: 300px; border: 2px solid #fff;">
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('captureBtn');
        const frameImg = document.getElementById('frameImg');
        const popup = document.getElementById('popup');
        const followBtn = document.getElementById('followBtn');
        const downloadArea = document.getElementById('downloadArea');
        const resultImage = document.getElementById('resultImage');

        // 【設定】作成したフレーム画像のURLに書き換えてください
        frameImg.src="frame1.png";

        // カメラの起動
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { alert("カメラの起動に失敗しました。ブラウザの設定でカメラを許可してください。"); });

        // シャッターボタンを押したときの処理
        captureBtn.addEventListener('click', () => {
            const ctx = canvas.getContext('2d');
            // キャンバスサイズを動画の比率（9:16など）に合わせる
            canvas.width = 1080;
            canvas.height = 1920;

            // 1. カメラ映像を描画（左右反転を戻して保存）
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            // ビデオの切り抜きと描画（カバーフィットの計算）
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.setTransform(1, 0, 0, 1, 0, 0); // 変形をリセット

            // 2. フレーム画像（透過PNG）を上に重ねて描画
            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);

            // 3. データURLに変換して結果用imgタグにセット
            resultImage.src = canvas.toDataURL('image/jpeg');

            // 4. Instagram誘導ポップアップを表示
            popup.style.display = 'flex';
        });

        // 「Instagramをフォローする」ボタンを押したときの処理
        followBtn.addEventListener('click', () => {
            // ユーザーが別タブでInstagramを開いたと仮定し、2秒後にダウンロードエリアを表示
            setTimeout(() => {
                followBtn.style.display = 'none';
                downloadArea.style.display = 'block';
            }, 2000);
        });
    </script>
</body>
</html>
