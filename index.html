<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フォトフレームカメラ</title>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background-color: #001e43; color: #fff; font-family: sans-serif; }
        .camera-container { position: relative; width: 100%; max-width: 400px; aspect-ratio: 9/16; overflow: hidden; background: #222; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; object-fit: contain; }
        .btn { margin-top: 15px; padding: 12px 24px; background-color: #ff3366; color: white; border: none; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; }
        /* 修正：「フォローしない」「戻る」ボタン用のスタイル（グレー） */
        .btn-secondary { background-color: #666; margin-top: 10px; }
        #canvas { display: none; }
        .popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .popup p { font-size: 18px; margin-bottom: 20px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <img class="frame" src="frame.png" id="frameImg" alt="Frame">
    </div>

    <button class="btn" id="captureBtn">写真を撮影する</button>

    <canvas id="canvas"></canvas>

    <div id="popup" class="popup">
        <p id="popupText">🎉 撮影が完了しました！<br>公式Instagramをフォローして<br>写真を保存しよう！</p>
        
        <a href="https://www.instagram.com/shonandai_tanabata?igsh=MXhhcmphbDZtcjZtMA%3D%3D&utm_source=qr" target="_blank" class="btn" id="followBtn">Instagramをフォローする</a>
        
        <button class="btn btn-secondary" id="skipBtn">Instagramをフォローしない</button>
        
        <div id="downloadArea" style="display:none; margin-top: 20px;">
            <p>👇 下の画像を表示・長押しして保存してください</p>
            <img id="resultImage" style="width: 100%; max-width: 300px; border: 2px solid #fff;">
        </div>

        <button class="btn btn-secondary" id="backBtn">もう一度撮影する（戻る）</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('captureBtn');
        const frameImg = document.getElementById('frameImg');
        const popup = document.getElementById('popup');
        const popupText = document.getElementById('popupText'); // 追加
        const followBtn = document.getElementById('followBtn');
        const skipBtn = document.getElementById('skipBtn'); // 追加
        const downloadArea = document.getElementById('downloadArea');
        const resultImage = document.getElementById('resultImage');
        const backBtn = document.getElementById('backBtn');

        frameImg.crossOrigin = "anonymous";
        frameImg.src = "frame.png"; 

        const constraints = {
            video: {
                facingMode: "environment",
                width: { ideal: 1920 },
                height: { ideal: 1080 }
            },
            audio: false
        };

        navigator.mediaDevices.getUserMedia(constraints)
            .then(stream => { video.srcObject = stream; })
            .catch(err => { alert("カメラの起動に失敗しました。ブラウザの設定でカメラを許可してください。"); });

        // シャッターボタンの処理
        captureBtn.addEventListener('click', () => {
            const ctx = canvas.getContext('2d');
            const videoWidth = video.videoWidth;
            const videoHeight = video.videoHeight;
            
            canvas.width = videoHeight;
            canvas.height = videoWidth;

            const targetWidth = canvas.width;
            const targetHeight = canvas.height;
            const sourceWidth = videoWidth;
            const sourceHeight = (videoWidth * 16) / 9;
            const sourceY = (videoHeight - sourceHeight) / 2;

            ctx.drawImage(video, 0, sourceY, sourceWidth, sourceHeight, 0, 0, targetWidth, targetHeight);

            // フレーム画像を重ねて描画
            try {
                ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
                resultImage.src = canvas.toDataURL('image/jpeg', 1.0);
                popup.style.display = 'flex';
            } catch (e) {
                alert("画像の読み込みに失敗しました。");
                console.error(e);
            }
        });

        // Instagramボタンの処理（フォローする側）
        followBtn.addEventListener('click', () => {
            setTimeout(() => {
                popupText.style.display = 'none'; // メッセージをすっきりさせる
                followBtn.style.display = 'none';
                skipBtn.style.display = 'none';   // スキップボタンも消す
                downloadArea.style.display = 'block';
            }, 2000);
        });

        // 追加：「Instagramをフォローしない」ボタンの処理
        skipBtn.addEventListener('click', () => {
            popupText.style.display = 'none';    // メッセージを非表示
            followBtn.style.display = 'none';    // フォローボタンを非表示
            skipBtn.style.display = 'none';      // 自分（スキップボタン）を非表示
            downloadArea.style.display = 'block'; // すぐに保存エリアを表示
        });

        // 「戻る」ボタンの処理
        backBtn.addEventListener('click', () => {
            popup.style.display = 'none';
            downloadArea.style.display = 'none';
            popupText.style.display = 'block';     // 初期状態に戻す
            followBtn.style.display = 'inline-block'; // 初期状態に戻す
            skipBtn.style.display = 'inline-block';   // 初期状態に戻す
            resultImage.src = "";
        });
    </script>
</body>
</html>
